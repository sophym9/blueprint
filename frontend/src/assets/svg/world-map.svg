<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply"/>
    </filter>
    <radialGradient id="glow-west" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003087" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#003087" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-east" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-central" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FACC15" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FACC15" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Parchment background -->
  <rect width="1200" height="800" fill="#F5E6C8"/>
  <rect width="1200" height="800" fill="#E8D4A8" opacity="0.4" filter="url(#paper)"/>

  <!-- Decorative border -->
  <rect x="12" y="12" width="1176" height="776" fill="none" stroke="#8B6914" stroke-width="3" rx="4"/>
  <rect x="20" y="20" width="1160" height="760" fill="none" stroke="#C9A84C" stroke-width="1.5" rx="2"/>
  <!-- Corner ornaments -->
  <circle cx="20" cy="20" r="6" fill="#C9A84C"/>
  <circle cx="1180" cy="20" r="6" fill="#C9A84C"/>
  <circle cx="20" cy="780" r="6" fill="#C9A84C"/>
  <circle cx="1180" cy="780" r="6" fill="#C9A84C"/>

  <!-- Title -->
  <text x="600" y="55" font-family="'IM Fell English', serif" font-size="28" fill="#5C3D11" text-anchor="middle" font-style="italic">The Realm of Duke</text>
  <line x1="380" y1="62" x2="820" y2="62" stroke="#C9A84C" stroke-width="1"/>

  <!-- Terrain background patches -->
  <!-- West forest -->
  <ellipse cx="240" cy="410" rx="180" ry="200" fill="#8B8B7A" opacity="0.12"/>
  <!-- Central plains -->
  <ellipse cx="580" cy="430" rx="160" ry="130" fill="#C9A84C" opacity="0.08"/>
  <!-- East grove -->
  <ellipse cx="900" cy="290" rx="150" ry="130" fill="#4ADE80" opacity="0.1"/>

  <!-- Roads connecting regions -->
  <path d="M 350 410 Q 470 390 530 430" stroke="#8B6914" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.6"/>
  <path d="M 640 430 Q 720 350 800 290" stroke="#8B6914" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.6"/>
  <path d="M 350 380 Q 600 200 800 260" stroke="#8B6914" stroke-width="2" fill="none" stroke-dasharray="5,6" opacity="0.3"/>

  <!-- West region glow -->
  <ellipse cx="240" cy="400" rx="160" ry="160" fill="url(#glow-west)"/>
  <!-- Central region glow -->
  <ellipse cx="580" cy="430" rx="140" ry="120" fill="url(#glow-central)"/>
  <!-- East region glow -->
  <ellipse cx="900" cy="280" rx="130" ry="120" fill="url(#glow-east)"/>

  <!-- West region: mini chapel silhouette -->
  <g transform="translate(175,320)">
    <rect x="20" y="40" width="50" height="55" fill="#003087" opacity="0.7" rx="2"/>
    <polygon points="45,0 65,40 25,40" fill="#003087" opacity="0.8"/>
    <rect x="38" y="50" width="14" height="20" fill="#C9A84C" opacity="0.6"/>
  </g>
  <!-- West region label -->
  <text x="240" y="490" font-family="'IM Fell English', serif" font-size="20" fill="#003087" text-anchor="middle" font-weight="bold">The Western Keep</text>
  <text x="240" y="510" font-family="'IM Fell English', serif" font-size="12" fill="#5C3D11" text-anchor="middle" font-style="italic">Ancient halls of glory</text>

  <!-- Central region: mini crossroads -->
  <g transform="translate(535,360)">
    <rect x="15" y="15" width="50" height="50" fill="#FACC15" opacity="0.5" rx="3"/>
    <line x1="40" y1="5" x2="40" y2="75" stroke="#8B6914" stroke-width="3"/>
    <line x1="5" y1="40" x2="75" y2="40" stroke="#8B6914" stroke-width="3"/>
    <circle cx="40" cy="40" r="8" fill="#C9A84C"/>
  </g>
  <!-- Central region label -->
  <text x="580" y="500" font-family="'IM Fell English', serif" font-size="20" fill="#8B6914" text-anchor="middle" font-weight="bold">The Central Crossing</text>
  <text x="580" y="520" font-family="'IM Fell English', serif" font-size="12" fill="#5C3D11" text-anchor="middle" font-style="italic">Heart of the realm</text>

  <!-- East region: mini cottage row -->
  <g transform="translate(825,210)">
    <rect x="0" y="25" width="25" height="25" fill="#4ADE80" opacity="0.6" rx="1"/>
    <polygon points="12,5 25,25 0,25" fill="#8B8B7A" opacity="0.7"/>
    <rect x="30" y="25" width="25" height="25" fill="#4ADE80" opacity="0.6" rx="1"/>
    <polygon points="42,5 55,25 30,25" fill="#8B8B7A" opacity="0.7"/>
    <rect x="60" y="25" width="25" height="25" fill="#4ADE80" opacity="0.6" rx="1"/>
    <polygon points="72,5 85,25 60,25" fill="#8B8B7A" opacity="0.7"/>
  </g>
  <!-- East region label -->
  <text x="900" y="370" font-family="'IM Fell English', serif" font-size="20" fill="#2D7D3A" text-anchor="middle" font-weight="bold">The Eastern Grove</text>
  <text x="900" y="390" font-family="'IM Fell English', serif" font-size="12" fill="#5C3D11" text-anchor="middle" font-style="italic">Where every journey begins</text>

  <!-- Compass rose -->
  <g transform="translate(1090,680)">
    <circle cx="0" cy="0" r="42" fill="#F0D9A8" stroke="#C9A84C" stroke-width="1.5"/>
    <polygon points="0,-36 5,-8 -5,-8" fill="#003087"/>
    <polygon points="0,36 5,8 -5,8" fill="#8B8B7A"/>
    <polygon points="-36,0 -8,5 -8,-5" fill="#8B8B7A"/>
    <polygon points="36,0 8,5 8,-5" fill="#8B8B7A"/>
    <circle cx="0" cy="0" r="5" fill="#C9A84C"/>
    <text x="0" y="-42" font-family="'IM Fell English', serif" font-size="11" fill="#003087" text-anchor="middle">N</text>
    <text x="0" y="54" font-family="'IM Fell English', serif" font-size="11" fill="#5C3D11" text-anchor="middle">S</text>
    <text x="-50" y="4" font-family="'IM Fell English', serif" font-size="11" fill="#5C3D11" text-anchor="middle">W</text>
    <text x="50" y="4" font-family="'IM Fell English', serif" font-size="11" fill="#5C3D11" text-anchor="middle">E</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(60,730)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#5C3D11" stroke-width="2"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#5C3D11" stroke-width="2"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#5C3D11" stroke-width="1.5"/>
    <line x1="120" y1="-4" x2="120" y2="4" stroke="#5C3D11" stroke-width="2"/>
    <text x="60" y="-8" font-family="'IM Fell English', serif" font-size="10" fill="#5C3D11" text-anchor="middle">One League</text>
  </g>

  <!-- Decorative trees (small triangles) -->
  <g opacity="0.35" fill="#5C7A3E">
    <polygon points="100,320 108,340 92,340"/>
    <polygon points="115,330 122,348 108,348"/>
    <polygon points="130,315 137,335 123,335"/>
    <polygon points="1020,180 1027,198 1013,198"/>
    <polygon points="1035,170 1042,190 1028,190"/>
    <polygon points="1050,185 1057,203 1043,203"/>
    <polygon points="450,600 457,618 443,618"/>
    <polygon points="430,610 437,628 423,628"/>
  </g>

  <!-- Water (small river) -->
  <path d="M 380 650 Q 450 620 520 640 Q 580 655 640 630" stroke="#7EC8E3" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round"/>
  <text x="510" y="670" font-family="'IM Fell English', serif" font-size="11" fill="#4A90B8" text-anchor="middle" font-style="italic">The Blue Run</text>
</svg>
