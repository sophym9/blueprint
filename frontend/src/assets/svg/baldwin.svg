<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F5E6C8"/>
  <rect x="0" y="235" width="400" height="65" fill="#D4C49A" opacity="0.5"/>
  <!-- Main concert hall body -->
  <rect x="80" y="120" width="240" height="120" fill="#003087" rx="2"/>
  <rect x="82" y="122" width="236" height="116" fill="#0A3A9A" opacity="0.2"/>
  <!-- Grand arched entrance -->
  <path d="M 155 235 Q 155 190 200 190 Q 245 190 245 235 Z" fill="#1A0A4A"/>
  <rect x="155" y="215" width="90" height="20" fill="#1A0A4A"/>
  <!-- Arch keystone detail -->
  <path d="M 157 235 Q 157 192 200 192 Q 243 192 243 235 Z" fill="none" stroke="#C9A84C" stroke-width="2"/>
  <!-- Columns flanking entrance -->
  <rect x="130" y="150" width="20" height="85" fill="#8B8B7A" rx="1"/>
  <rect x="250" y="150" width="20" height="85" fill="#8B8B7A" rx="1"/>
  <ellipse cx="140" cy="150" rx="12" ry="5" fill="#6B6B5A"/>
  <ellipse cx="260" cy="150" rx="12" ry="5" fill="#6B6B5A"/>
  <!-- Pediment / triangular roof -->
  <polygon points="70,120 200,65 330,120" fill="#003087"/>
  <polygon points="74,120 200,68 326,120" fill="#0A3A9A" opacity="0.15"/>
  <polygon points="120,120 200,82 280,120" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
  <!-- Musical note motifs carved in stone -->
  <text x="200" y="108" font-family="serif" font-size="22" fill="#C9A84C" text-anchor="middle" opacity="0.6">♩ ♪ ♩</text>
  <!-- Windows with warm glow -->
  <g fill="#C9A84C" opacity="0.6">
    <path d="M 100 155 Q 100 140 112 140 Q 124 140 124 155 L 124 175 L 100 175 Z"/>
    <path d="M 276 155 Q 276 140 288 140 Q 300 140 300 155 L 300 175 L 276 175 Z"/>
  </g>
  <!-- Side windows -->
  <g fill="#C9A84C" opacity="0.45">
    <rect x="88" y="180" width="24" height="30" rx="2"/>
    <rect x="288" y="180" width="24" height="30" rx="2"/>
  </g>
  <!-- Steps -->
  <rect x="120" y="235" width="160" height="6" fill="#8B8B7A" opacity="0.5" rx="1"/>
  <rect x="110" y="241" width="180" height="5" fill="#8B8B7A" opacity="0.35" rx="1"/>
  <!-- Drop shadow -->
  <ellipse cx="200" cy="250" rx="130" ry="7" fill="#003087" opacity="0.09"/>
  <!-- Label -->
  <text x="200" y="274" font-family="'IM Fell English', serif" font-size="15" fill="#003087" text-anchor="middle">The Hall of Echoes</text>
  <text x="200" y="288" font-family="'DM Sans', sans-serif" font-size="10" fill="#8B8B7A" text-anchor="middle">Baldwin Auditorium</text>
</svg>
