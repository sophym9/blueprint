<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#FDF6E3"/>
  <rect x="0" y="235" width="400" height="65" fill="#D4C49A" opacity="0.4"/>
  <!-- Modern-ish building with open courtyard feel -->
  <!-- Left wing -->
  <rect x="40" y="130" width="120" height="110" fill="#8B6914" opacity="0.7" rx="2"/>
  <rect x="42" y="132" width="116" height="106" fill="#C9A84C" opacity="0.1"/>
  <!-- Right wing -->
  <rect x="240" y="130" width="120" height="110" fill="#8B6914" opacity="0.7" rx="2"/>
  <rect x="242" y="132" width="116" height="106" fill="#C9A84C" opacity="0.1"/>
  <!-- Center arch/courtyard connector -->
  <rect x="155" y="155" width="90" height="85" fill="#7A5C2E" opacity="0.5" rx="1"/>
  <path d="M 155 155 Q 155 135 200 135 Q 245 135 245 155 Z" fill="#5C3D11" opacity="0.7"/>
  <!-- Open courtyard area -->
  <rect x="165" y="165" width="70" height="65" fill="#F0D4A0" opacity="0.5" rx="2"/>
  <!-- Lanterns on courtyard -->
  <circle cx="175" cy="172" r="5" fill="#FACC15" opacity="0.7"/>
  <circle cx="225" cy="172" r="5" fill="#FACC15" opacity="0.7"/>
  <!-- Food stall banners -->
  <path d="M 40 130 Q 60 118 80 130 Q 100 118 120 130 Q 140 118 160 130" stroke="#003087" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 240 130 Q 260 118 280 130 Q 300 118 320 130 Q 340 118 360 130" stroke="#FACC15" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- Windows left wing -->
  <g fill="#C9A84C" opacity="0.6">
    <rect x="55" y="148" width="25" height="20" rx="2"/>
    <rect x="92" y="148" width="25" height="20" rx="2"/>
    <rect x="130" y="148" width="25" height="20" rx="2"/>
    <rect x="55" y="180" width="25" height="20" rx="2"/>
    <rect x="92" y="180" width="25" height="20" rx="2"/>
    <rect x="130" y="180" width="25" height="20" rx="2"/>
  </g>
  <!-- Windows right wing -->
  <g fill="#C9A84C" opacity="0.6">
    <rect x="250" y="148" width="25" height="20" rx="2"/>
    <rect x="287" y="148" width="25" height="20" rx="2"/>
    <rect x="322" y="148" width="25" height="20" rx="2"/>
    <rect x="250" y="180" width="25" height="20" rx="2"/>
    <rect x="287" y="180" width="25" height="20" rx="2"/>
    <rect x="322" y="180" width="25" height="20" rx="2"/>
  </g>
  <!-- Roof flat with railing -->
  <rect x="40" y="124" width="120" height="8" fill="#5C3D11" rx="1"/>
  <rect x="240" y="124" width="120" height="8" fill="#5C3D11" rx="1"/>
  <!-- Front steps -->
  <rect x="155" y="235" width="90" height="6" fill="#8B8B7A" opacity="0.5" rx="1"/>
  <!-- Drop shadow -->
  <ellipse cx="200" cy="249" rx="160" ry="7" fill="#5C3D11" opacity="0.08"/>
  <!-- Label -->
  <text x="200" y="272" font-family="'IM Fell English', serif" font-size="15" fill="#8B6914" text-anchor="middle">The New Tavern</text>
  <text x="200" y="286" font-family="'DM Sans', sans-serif" font-size="10" fill="#8B8B7A" text-anchor="middle">Brodhead Center</text>
</svg>
