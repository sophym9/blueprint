services:
  backend:
    build: ./backend
    container_name: lastchapter-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/last_chapter.db
      - UPLOADS_DIR=/app/uploads
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
    volumes:
      - db-data:/app/data
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=/api
    container_name: lastchapter-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
  uploads-data:
